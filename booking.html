<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book a Table – Café Swaad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">Café<span>Swaad</span></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="booking.html">Contact</a></li>
      </ul>
      <a href="booking.html" class="btn-nav">Book a Table</a>
    </div>
  </header>

  <main>
    <section class="booking-layout container">
      <!-- Form -->
      <form class="booking-form" id="bookingForm">
        <h2>Book a Table</h2>
        <p>Fill in your details and we’ll confirm your reservation shortly.</p>

        <div class="form-grid">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input id="name" name="name" type="text" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" type="tel" required />
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>

          <div class="form-group">
            <label for="time">Time</label>
            <input id="time" name="time" type="time" required />
          </div>

          <div class="form-group">
            <label for="guests">Number of Guests</label>
            <input id="guests" name="guests" type="number" min="1" max="20" required />
          </div>

          <div class="form-group">
            <label for="occasion">Occasion (optional)</label>
            <select id="occasion" name="occasion">
              <option value="">Select</option>
              <option value="casual">Casual visit</option>
              <option value="birthday">Birthday</option>
              <option value="meeting">Meeting</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Special Requests</label>
          <textarea id="message" name="message" placeholder="Allergies, seating preference, etc."></textarea>
        </div>

        <button type="submit" class="btn-primary">Submit Booking</button>
        <p id="formMessage" style="margin-top: 0.75rem; font-size: 0.9rem;"></p>
      </form>

      <!-- Contact info + Map -->
      <aside class="booking-aside">
        <div class="contact-card">
          <h3>Visit Us</h3>
          <p>123 Brew Street, Coffee Lane</p>
          <p>Open daily: 8 AM – 11 PM</p>
          <div class="contact-links">
            <a href="tel:+911234567890" class="btn-secondary">Call Now</a>
            <a href="https://wa.me/911234567890" class="btn-secondary">WhatsApp</a>
          </div>
        </div>

        <div class="map-wrapper">
          <!-- You can replace src with a real Google Maps embed -->
          <iframe
            src="https://maps.google.com/maps?q=new%20delhi&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%"
            height="260"
            style="border:0;"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </aside>
    </section>
  </main>

  <footer>
    <div class="container footer-content">
      <p>© 2025 Café Aroma. Demo website for portfolio.</p>
      <div class="footer-links">
        <a href="menu.html">Menu</a>
        <a href="index.html">Home</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
