<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

<body>
  <header>
    <div class="container navbar">
      <div class="logo">Café<span>Aroma</span></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="booking.html">Contact</a></li>
      </ul>
      <a href="booking.html" class="btn-nav">Book a Table</a>
    </div>

  <main>
    <section class="gallery-header container">
      <h1>Gallery</h1>
      <p>A look inside our café – coffee, food and warm ambience.</p>
    </section>

    <section class="gallery-grid container">
      <!-- Top hero-ish shots -->
      <img src="images/coffee-pour.jpg" alt="Barista pouring latte art into a cup" />
      <img src="images/cafe-interior-1.jpg" alt="Rustic café interior with wooden wall" />
      <img src="images/espresso-machine.jpg" alt="Espresso machine pulling a shot" />

      <!-- Drinks & food -->
      <img src="images/latte-table.jpg" alt="Latte with art on a wooden table" />
      <img src="images/latte-wood.jpg" alt="Close-up of latte art on a wooden surface" />
      <img src="images/pasta.jpg" alt="Bowl of creamy pasta with vegetables" />

      <!-- Snacks & people -->
      <img src="images/cafe-snacks.jpg" alt="Coffee and macarons in a cozy café" />
      <img src="images/barista.jpg" alt="Barista holding a cup of coffee" />

      <!-- Background & mood shots -->
      <img src="images/pasta-pattern.jpg" alt="Pattern of bow-tie pasta on spaghetti background" />
      <img src="images/tea-books.jpg" alt="Cup of tea with flowers and open books" />
    </section>
  </main>

  <footer>
    <div class="container footer-content">
      <p>© 2025 Café Aroma. Demo website for portfolio.</p>
      <div class="footer-links">
        <a href="booking.html">Contact</a>
